upstream blog {
    server blog:5000;
}

upstream shop {
    server shop:5001;
}

upstream admin {
    server admin:5002;
}

upstream dashboard {
    server dashboard:5003;
}

# Cloudflare 會把真實 IP 放在 CF-Connecting-IP,
# 啟用 set_real_ip_from + real_ip_header 讓 nginx 看到真實 client IP
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# 預設 server:Host 沒對應到任何子網域時 fallback 到 dashboard,
# 這樣 quick tunnel(*.trycloudflare.com) 也能直接看到 dashboard,
# 同時任何未設定的子網域也會被導到 dashboard。
# 正式部署若不想用 fallback,把下方 location 改成:
#   return 301 https://trading.thetainformation.com$request_uri;
server {
    listen 80 default_server;
    server_name _;

    location /static/ {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Dashboard:trading.thetainformation.com(主站,巨集經濟儀表板)
server {
    listen 80;
    server_name trading.thetainformation.com;

    location /static/ {
        proxy_pass http://dashboard;
