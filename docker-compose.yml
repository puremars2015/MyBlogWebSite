services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: myblogwebsite-nginx
    ports:
      - "80:80"
    depends_on:
      - blog
      - shop
      - admin
      - dashboard
    networks:
      - app-network
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

  blog:
    build:
      context: ./blog
      dockerfile: Dockerfile
    image: myblogwebsite-blog
    environment:
      - FLASK_ENV=production
      - DB_HOST=db
      - DB_PORT=1433
      - DB_NAME=BlogShopDB
      - DB_USER=sa
      - DB_PASSWORD=${SA_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_COOKIE_DOMAIN=.localhost
      - EXPECTED_USER_TYPE=member
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    expose:
      - "5000"

  shop:
    build:
      context: ./shop
      dockerfile: Dockerfile
    image: myblogwebsite-shop
    environment:
      - FLASK_ENV=production
      - DB_HOST=db
      - DB_PORT=1433
      - DB_NAME=BlogShopDB
      - DB_USER=sa
      - DB_PASSWORD=${SA_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_COOKIE_DOMAIN=.localhost
      - EXPECTED_USER_TYPE=member
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    expose:
      - "5001"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    image: myblogwebsite-admin
    environment:
      - FLASK_ENV=production
      - DB_HOST=db
      - DB_PORT=1433
      - DB_NAME=BlogShopDB
      - DB_USER=sa
      - DB_PASSWORD=${SA_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_COOKIE_DOMAIN=.localhost
      - EXPECTED_USER_TYPE=admin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    expose:
      - "5002"
    # 開發用:直接把 port 5002 expose 出來,繞過 .local 子網域的瀏覽器 cookie 怪問題
    # 上正式環境記得拿掉這段
    ports:
      - "5002:5002"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: myblogwebsite-dashboard
    environment:
      - FLASK_ENV=production
      - DB_HOST=db
      - DB_PORT=1433
      - DB_NAME=BlogShopDB
      - DB_USER=sa
      - DB_PASSWORD=${SA_PASSWORD}
      - DASHBOARD_INGEST_TOKEN=${DASHBOARD_INGEST_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    expose:
      - "5003"

  dashboard-scheduler:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: myblogwebsite-dashboard-scheduler
    command: ["python", "scheduler.py"]
    environment:
      - DB_HOST=db
      - DB_PORT=1433
      - DB_NAME=BlogShopDB
      - DB_USER=sa
      - DB_PASSWORD=${SA_PASSWORD}
      - DASHBOARD_SCHEDULER_POLL_SECONDS=30
      # Future API keys should be provided from .env, not stored in admin.
      - FRED_API_KEY=${FRED_API_KEY:-}
      - BLS_API_KEY=${BLS_API_KEY:-}
      - METALS_API_KEY=${METALS_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    image: myblogwebsite-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d
      - sqlserver-data:/var/opt/mssql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q 'SELECT 1' -C -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  app-network:
    driver: bridge

volumes:
  sqlserver-data:
